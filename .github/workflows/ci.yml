name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job for macOS: Handles Swift project and Flutter macOS build
  macos-ci:
    name: Swift & Flutter macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Swift Project Steps
      - name: Swift Unit Tests
        run: |
          xcodebuild test \
            -project wPSPsync.xcodeproj \
            -scheme wPSPsync \
            -destination 'platform=macOS' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Build Swift Application
        run: |
          xcodebuild build \
            -project wPSPsync.xcodeproj \
            -scheme wPSPsync \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build/swift \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      
      - name: Compress Swift Artifact
        run: |
          cd build/swift/Build/Products/Release
          zip -r ../../../../wPSPsync-Swift-macOS.zip wPSPsync.app

      # Flutter Project Steps
      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Flutter Unit Tests
        run: |
          cd wpspsync_flutter
          flutter test

      - name: Build Flutter macOS
        run: |
          cd wpspsync_flutter
          flutter build macos --release

      - name: Compress Flutter macOS Artifact
        run: |
          cd wpspsync_flutter/build/macos/Build/Products/Release
          zip -r ../../../../../wPSPsync-Flutter-macOS.zip *.app
          cd ../../../../../

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Builds
          path: |
            wPSPsync-Swift-macOS.zip
            wPSPsync-Flutter-macOS.zip

  # Job for Windows: Handles Flutter Windows build
  windows-ci:
    name: Flutter Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Build Flutter Windows
        run: |
          cd wpspsync_flutter
          flutter build windows --release

      - name: Compress Windows Artifact
        shell: pwsh
        run: |
          Compress-Archive -Path wpspsync_flutter/build/windows/x64/runner/Release/* -DestinationPath wPSPsync-Flutter-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: wPSPsync-Flutter-Windows.zip

  # Job for Linux: Handles Flutter Linux build
  linux-ci:
    name: Flutter Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config

      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Build Flutter Linux
        run: |
          cd wpspsync_flutter
          flutter build linux --release

      - name: Compress Linux Artifact
        run: |
          cd wpspsync_flutter/build/linux/x64/release/bundle
          zip -r ../../../../../wPSPsync-Flutter-Linux.zip .
          cd ../../../../../

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: wPSPsync-Flutter-Linux.zip
