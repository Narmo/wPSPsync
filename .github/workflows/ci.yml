name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  # Job for macOS: Handles Swift project and Flutter macOS build
  macos-ci:
    name: Swift & Flutter macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Swift Project Steps
      - name: Swift Unit Tests
        run: |
          xcodebuild test \
            -project wPSPsync.xcodeproj \
            -scheme wPSPsync \
            -destination 'platform=macOS' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Build Swift Application
        run: |
          xcodebuild build \
            -project wPSPsync.xcodeproj \
            -scheme wPSPsync \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build/swift \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      
      - name: Compress Swift Artifact
        run: |
          cd build/swift/Build/Products/Release
          zip -r ../../../../wPSPsync-Swift-macOS.zip wPSPsync.app

      # Flutter Project Steps
      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Flutter Unit Tests
        run: |
          cd wpspsync_flutter
          flutter test

      - name: Build Flutter macOS
        run: |
          cd wpspsync_flutter
          flutter build macos --release

      - name: Compress Flutter macOS Artifact
        run: |
          cd wpspsync_flutter/build/macos/Build/Products/Release
          zip -r ../../../../../wPSPsync-Flutter-macOS.zip *.app
          cd ../../../../../

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Builds
          path: |
            wPSPsync-Swift-macOS.zip
            wPSPsync-Flutter-macOS.zip

  # Job for Windows: Handles Flutter Windows build
  windows-ci:
    name: Flutter Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Build Flutter Windows
        run: |
          cd wpspsync_flutter
          flutter build windows --release

      - name: Compress Windows Artifact
        shell: pwsh
        run: |
          Compress-Archive -Path wpspsync_flutter/build/windows/x64/runner/Release/* -DestinationPath wPSPsync-Flutter-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: wPSPsync-Flutter-Windows.zip

  # Job for Linux: Handles Flutter Linux build
  linux-ci:
    name: Flutter Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config

      - name: Flutter Dependencies
        run: |
          cd wpspsync_flutter
          flutter pub get

      - name: Build Flutter Linux
        run: |
          cd wpspsync_flutter
          flutter build linux --release

      - name: Compress Linux Artifact
        run: |
          cd wpspsync_flutter/build/linux/x64/release/bundle
          zip -r ../../../../../wPSPsync-Flutter-Linux.zip .
          cd ../../../../../

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: wPSPsync-Flutter-Linux.zip

  # Job to create the Release
  release:
    name: Create GitHub Release
    needs: [macos-ci, windows-ci, linux-ci]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize Release Files
        run: |
          mkdir release_files
          # Move and Rename Windows and Linux
          cp artifacts/Windows-Build/wPSPsync-Flutter-Windows.zip release_files/wPSPsync-Windows.zip
          cp artifacts/Linux-Build/wPSPsync-Flutter-Linux.zip release_files/wPSPsync-Linux.zip
          # Extract and repackage only the Swift version for macOS as wPSPsync-macOS.zip
          unzip artifacts/macOS-Builds/wPSPsync-Swift-macOS.zip -d macos_temp
          cd macos_temp && zip -r ../release_files/wPSPsync-macOS.zip wPSPsync.app && cd ..

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: |
            [changelog]
            header = "## 📝 Changelog\n"
            body = """
            {% if version %}\
                ### [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
            {% else %}\
                ### [Unreleased]
            {% endif %}\
            {% for group, commits in commits | group_by(attribute="group") %}
                #### {{ group | upper_first }}
                {% for commit in commits %}
                    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
                {% endfor %}
            {% endfor %}\n
            """
            footer = ""
            trim = true
          args: --verbose --latest --strip header
        env:
          OUTPUT: cliff_changelog.md

      - name: Prepare Release Body
        run: |
          cat <<EOF > release_body.md
          ## 📦 Installation Instructions

          ### 🪟 Windows
          1. Download \`wPSPsync-Windows.zip\`.
          2. Extract all files to a folder of your choice.
          3. Run \`wpspsync_flutter.exe\`.

          ### 🍎 macOS (Native Swift Version)
          1. Download \`wPSPsync-macOS.zip\`.
          2. Extract the archive.
          3. Move \`wPSPsync.app\` to your \`/Applications\` folder.
          *Note: You may need to right-click and select "Open" for the first time due to security settings.*

          ### 🐧 Linux
          1. Download \`wPSPsync-Linux.zip\`.
          2. Extract the archive: \`unzip wPSPsync-Linux.zip -d wPSPsync\`.
          3. Enter the directory and grant execution permissions:
             \`\`\`bash
             cd wPSPsync
             chmod +x wpspsync_flutter
             \`\`\`
          4. Run the application: \`./wpspsync_flutter\`.

          ---
          EOF
          cat cliff_changelog.md >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          body_path: release_body.md
